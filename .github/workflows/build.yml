# Build InputFlow installers + publikasi ke GitHub Releases (unduhan publik)

name: Build installers

on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-windows:
    name: Windows installer (x64)
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: |
            native/package-lock.json
            frontend/package-lock.json

      - name: Set app version from Git tag
        if: startsWith(github.ref, 'refs/tags/v')
        working-directory: frontend
        shell: bash
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          echo "Using version $VERSION from tag"
          npm version "$VERSION" --no-git-tag-version --allow-same-version

      - name: Build native module
        working-directory: native
        run: |
          npm ci
          npm run build

      - name: Build Electron app + NSIS installer
        working-directory: frontend
        env:
          CI: true
        run: |
          npm ci
          npm run dist:win

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: InputFlow-Windows-x64
          path: frontend/release/*.exe
          if-no-files-found: error
          retention-days: 90

  build-macos:
    name: macOS DMG (arm64)
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: |
            native/package-lock.json
            frontend/package-lock.json

      - name: Set app version from Git tag
        if: startsWith(github.ref, 'refs/tags/v')
        working-directory: frontend
        shell: bash
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          echo "Using version $VERSION from tag"
          npm version "$VERSION" --no-git-tag-version --allow-same-version

      - name: Build native module
        working-directory: native
        run: |
          npm ci
          npm run build

      - name: Build Electron app + DMG
        working-directory: frontend
        env:
          CI: true
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
        run: |
          npm ci
          npm run dist:mac

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: InputFlow-macOS-arm64
          path: frontend/release/*.dmg
          if-no-files-found: error
          retention-days: 90

  release:
    name: Publish GitHub Release
    needs: [build-windows, build-macos]
    if: |
      always() &&
      needs.build-windows.result == 'success' &&
      needs.build-macos.result == 'success' &&
      (
        (github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')) ||
        startsWith(github.ref, 'refs/tags/v') ||
        github.event_name == 'workflow_dispatch'
      )
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download Windows installer
        uses: actions/download-artifact@v4
        with:
          name: InputFlow-Windows-x64
          path: dist/windows

      - name: Download macOS installer
        uses: actions/download-artifact@v4
        with:
          name: InputFlow-macOS-arm64
          path: dist/macos

      - name: Set release metadata
        id: meta
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            TAG="${GITHUB_REF#refs/tags/}"
            echo "tag=$TAG" >> "$GITHUB_OUTPUT"
            echo "name=InputFlow $TAG" >> "$GITHUB_OUTPUT"
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          else
            echo "tag=latest" >> "$GITHUB_OUTPUT"
            echo "name=InputFlow (Latest)" >> "$GITHUB_OUTPUT"
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish to GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: ${{ steps.meta.outputs.name }}
          prerelease: ${{ steps.meta.outputs.prerelease }}
          make_latest: true
          draft: false
          body: |
            ## Unduh InputFlow

            | Platform | File | Cara pakai |
            |----------|------|------------|
            | **Windows 10/11 (64-bit)** | `InputFlow-Setup-*.exe` | Installer → Next → Install |
            | **macOS (Apple Silicon M1/M2/M3)** | `InputFlow-*-arm64.dmg` | Buka DMG → tarik ke Applications |

            ### macOS — pesan "is damaged" / tidak bisa dibuka

            Bukan file rusak — macOS memblokir app unduhan (Gatekeeper). Setelah tarik ke Applications, jalankan di **Terminal**:

            ```bash
            xattr -cr /Applications/InputFlow.app
            open /Applications/InputFlow.app
            ```

            Atau: klik kanan app → **Open** → **Open** lagi (bukan double-click pertama).

            ### Windows — app tertutup / tidak jalan

            1. Pasang [VC++ Redistributable x64](https://aka.ms/vs/17/release/vc_redist.x64.exe)
            2. Jika ada dialog error, baca isinya; log: `%APPDATA%\inputflow\inputflow-startup.log`
            3. Controller PlayStation: aktifkan mode XInput (DS4Windows / Steam)

            Build: `${{ github.sha }}`
          files: |
            dist/windows/*
            dist/macos/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
