# Build InputFlow installers (Windows NSIS + macOS DMG)
# Artefak bisa diunduh dari tab Actions → run → Artifacts

name: Build installers

on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-windows:
    name: Windows installer (x64)
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: |
            native/package-lock.json
            frontend/package-lock.json

      - name: Build native module
        working-directory: native
        run: |
          npm ci
          npm run build

      - name: Build Electron app + NSIS installer
        working-directory: frontend
        env:
          CI: true
        run: |
          npm ci
          npm run dist:win

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: InputFlow-Windows-x64
          path: frontend/release/*.exe
          if-no-files-found: error
          retention-days: 30

  build-macos:
    name: macOS DMG (arm64)
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: |
            native/package-lock.json
            frontend/package-lock.json

      - name: Build native module
        working-directory: native
        run: |
          npm ci
          npm run build

      - name: Build Electron app + DMG
        working-directory: frontend
        env:
          CI: true
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
        run: |
          npm ci
          npm run dist:mac

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: InputFlow-macOS-arm64
          path: frontend/release/*.dmg
          if-no-files-found: error
          retention-days: 30

  release:
    name: Publish GitHub Release
    needs: [build-windows, build-macos]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: InputFlow-Windows-x64
          path: dist/windows

      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: InputFlow-macOS-arm64
          path: dist/macos

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/windows/*
            dist/macos/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
